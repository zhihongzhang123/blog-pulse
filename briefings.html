<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻简报 · Pulse</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #0a84ff; text-decoration: none; margin-bottom: 20px; font-size: 1rem; }
        .back-link:hover { color: #ffd60a; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 40px; text-align: center; background: linear-gradient(135deg, #ffd60a 0%, #ff9f0a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .briefing-card { background: rgba(44, 44, 46, 0.65); backdrop-filter: blur(20px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; transition: all 0.3s ease; }
        .briefing-card:hover { transform: translateY(-2px); box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4); }
        .briefing-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 10px; background: linear-gradient(135deg, #ffd60a 0%, #ff9f0a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .briefing-meta { color: #86868b; font-size: 0.9rem; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }
        .briefing-content { white-space: pre-wrap; line-height: 1.8; max-height: 400px; overflow-y: auto; padding: 20px; background: rgba(0, 0, 0, 0.3); border-radius: 12px; font-size: 0.95rem; }
        .view-full { display: inline-block; margin-top: 16px; color: #0a84ff; text-decoration: none; font-weight: 500; }
        .view-full:hover { color: #ffd60a; }
        .loading { text-align: center; padding: 40px; color: #86868b; }
        .error { text-align: center; padding: 40px; color: #ff4444; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← 返回首页</a>
        <h1 class="page-title">📰 新闻简报归档</h1>
        
        <div id="briefing-list">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        // 加载最新简报数据
        fetch('data/news/latest.json')
            .then(r => {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(data => {
                const container = document.getElementById('briefing-list');
                
                // 生成 HTML
                const html = `
                    <div class="briefing-card">
                        <h2 class="briefing-title">${escapeHtml(data.title || '新闻简报')}</h2>
                        <div class="briefing-meta">
                            <span>📅 ${escapeHtml(data.timestamp || '未知')}</span>
                            <span>📊 ${data.newsCount || 0} 条新闻</span>
                            <span>🆔 ${escapeHtml(data.msgid || 'N/A')}</span>
                        </div>
                        <div class="briefing-content">${escapeHtml(data.fullContent || data.coreContent || '暂无内容')}</div>
                        <a href="data/news/latest.html" class="view-full">查看完整简报 →</a>
                    </div>
                `;
                
                container.innerHTML = html;
            })
            .catch(e => {
                console.error('加载失败:', e);
                const container = document.getElementById('briefing-list');
                container.innerHTML = `
                    <div class="error">
                        <p>❌ 数据加载失败</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">${e.message}</p>
                        <p style="font-size: 0.9rem; margin-top: 20px;">请确保已运行同步脚本：</p>
                        <code style="background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 6px; display: inline-block; margin-top: 10px;">python3 scripts/sync-briefings-optimized.py</code>
                    </div>
                `;
            });
        
        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
    <script src="main.js"></script>
</body>
</html>
