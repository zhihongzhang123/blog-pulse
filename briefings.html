<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻简报 · Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-font: -apple-system, BlinkMacSystemFont, 'SF Pro SC', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Noto Sans SC', sans-serif;
            --apple-bg: #ffffff;
            --apple-bg-secondary: #f5f5f7;
            --apple-text: #1d1d1f;
            --apple-text-secondary: #86868b;
            --apple-accent: #0a84ff;
            --apple-accent-hover: #0066cc;
            --apple-border: rgba(0, 0, 0, 0.08);
            --apple-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            --apple-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.08);
            --apple-radius: 12px;
            --apple-radius-lg: 18px;
        }
        
        /* 深色模式变量 */
        body.dark-mode {
            --apple-bg: #000000;
            --apple-bg-secondary: #1d1d1f;
            --apple-text: #f5f5f7;
            --apple-text-secondary: #86868b;
            --apple-border: rgba(255, 255, 255, 0.08);
            --apple-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            --apple-shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        
        /* 系统自动深色模式 */
        @media (prefers-color-scheme: dark) {
            :root {
                --apple-bg-auto: #000000;
                --apple-bg-secondary-auto: #1d1d1f;
                --apple-text-auto: #f5f5f7;
                --apple-text-secondary-auto: #86868b;
                --apple-border-auto: rgba(255, 255, 255, 0.08);
                --apple-shadow-auto: 0 2px 8px rgba(0, 0, 0, 0.2);
                --apple-shadow-hover-auto: 0 8px 24px rgba(0, 0, 0, 0.3);
            }
            
            body:not(.dark-mode):not(.light-mode) {
                --apple-bg: var(--apple-bg-auto);
                --apple-bg-secondary: var(--apple-bg-secondary-auto);
                --apple-text: var(--apple-text-auto);
                --apple-text-secondary: var(--apple-text-secondary-auto);
                --apple-border: var(--apple-border-auto);
                --apple-shadow: var(--apple-shadow-auto);
                --apple-shadow-hover: var(--apple-shadow-hover-auto);
            }
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--apple-font);
            background: var(--apple-bg);
            color: var(--apple-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 24px;
        }
        
        /* 主题切换器 */
        .theme-switcher-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }
        
        .mode-switcher {
            display: inline-flex;
            gap: 6px;
            background: var(--apple-bg-secondary);
            padding: 4px;
            border-radius: 20px;
            border: 1px solid var(--apple-border);
        }
        
        .switch-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 18px;
            color: var(--apple-text-secondary);
        }
        
        .switch-btn:hover {
            background: rgba(10, 132, 255, 0.1);
            color: var(--apple-accent);
        }
        
        .switch-btn.active {
            background: var(--apple-accent);
            color: white;
        }
        
        .switch-btn.haptic-press {
            transform: scale(0.95);
        }
        
        /* 导航栏 */
        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--apple-accent);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--apple-bg-secondary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 40px;
        }
        
        .nav-back:hover {
            background: var(--apple-accent);
            color: white;
            transform: translateX(-4px);
        }
        
        .nav-back::before {
            content: '←';
            font-size: 16px;
            font-weight: 600;
        }
        
        /* 页面标题 */
        .page-header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .page-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }
        
        .page-title {
            font-family: var(--apple-font);
            font-size: clamp(32px, 6vw, 48px);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: var(--apple-text);
        }
        
        .page-subtitle {
            font-size: 17px;
            color: var(--apple-text-secondary);
            margin-top: 12px;
            font-weight: 400;
        }
        
        /* 简报卡片 */
        .briefing-list {
            display: grid;
            gap: 24px;
        }
        
        .briefing-card {
            background: var(--apple-bg-secondary);
            border-radius: var(--apple-radius-lg);
            padding: 32px;
            border: 1px solid var(--apple-border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) both;
            cursor: pointer;
        }
        
        .briefing-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--apple-shadow-hover);
            border-color: rgba(0, 102, 204, 0.2);
        }
        
        .briefing-card:nth-child(1) { animation-delay: 0.1s; }
        .briefing-card:nth-child(2) { animation-delay: 0.2s; }
        .briefing-card:nth-child(3) { animation-delay: 0.3s; }
        
        .briefing-card-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .briefing-icon {
            font-size: 32px;
            flex-shrink: 0;
        }
        
        .briefing-title {
            font-family: var(--apple-font);
            font-size: clamp(18px, 3vw, 22px);
            font-weight: 600;
            line-height: 1.4;
            color: var(--apple-text);
            letter-spacing: -0.01em;
        }
        
        .briefing-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--apple-border);
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--apple-text-secondary);
            font-weight: 400;
            background: rgba(0, 0, 0, 0.03);
            padding: 6px 12px;
            border-radius: 12px;
        }
        
        @media (prefers-color-scheme: dark) {
            .meta-item {
                background: rgba(255, 255, 255, 0.03);
            }
        }
        
        .briefing-preview {
            font-size: 15px;
            line-height: 1.7;
            color: var(--apple-text-secondary);
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .briefing-actions {
            display: flex;
            gap: 12px;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: var(--apple-radius);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0a84ff 0%, #0066cc 100%);
            color: white;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(10, 132, 255, 0.4);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--apple-accent);
            border: 1px solid var(--apple-accent);
        }
        
        .btn-secondary:hover {
            background: var(--apple-accent);
            color: white;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--apple-text-secondary);
            font-size: 15px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--apple-border);
            border-top-color: var(--apple-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 错误状态 */
        .error {
            text-align: center;
            padding: 60px 20px;
            color: #ff3b30;
        }
        
        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 响应式 - 移动端优化 */
        @media (max-width: 768px) {
            .container {
                padding: 32px 16px;
            }
            
            .page-header {
                margin-bottom: 32px;
            }
            
            .page-icon {
                font-size: 40px;
            }
            
            .page-title {
                font-size: 32px;
            }
            
            .page-subtitle {
                font-size: 14px;
            }
            
            .briefing-card {
                padding: 24px 20px;
                border-radius: var(--apple-radius);
            }
            
            .briefing-card-header {
                gap: 12px;
            }
            
            .briefing-icon {
                font-size: 28px;
            }
            
            .briefing-title {
                font-size: 17px;
                line-height: 1.4;
            }
            
            .briefing-meta {
                gap: 8px;
            }
            
            .meta-item {
                font-size: 11px;
                padding: 4px 10px;
            }
            
            .briefing-preview {
                font-size: 14px;
                line-height: 1.6;
                -webkit-line-clamp: 2;
            }
            
            .briefing-actions {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn {
                width: 100%;
                padding: 14px 20px;
                font-size: 14px;
            }
        }
        
        /* 小屏幕手机优化 */
        @media (max-width: 375px) {
            .container {
                padding: 24px 14px;
            }
            
            .page-icon {
                font-size: 36px;
            }
            
            .page-title {
                font-size: 26px;
            }
            
            .page-subtitle {
                font-size: 13px;
            }
            
            .briefing-card {
                padding: 20px 16px;
            }
            
            .briefing-title {
                font-size: 15px;
            }
            
            .briefing-preview {
                font-size: 13px;
                line-height: 1.55;
            }
            
            .nav-back {
                font-size: 13px;
                padding: 6px 12px;
            }
        }
        
        /* 移动端字体渲染优化 */
        @media (max-width: 768px) {
            body {
                -webkit-text-size-adjust: 100%;
                text-size-adjust: 100%;
            }
            
            .briefing-preview {
                text-rendering: optimizeLegibility;
                -webkit-font-smoothing: antialiased;
            }
        }
        
        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
        
        /* 选中效果 */
        ::selection {
            background: rgba(0, 102, 204, 0.2);
            color: var(--apple-text);
        }
        
        /* 移动端触摸优化 */
        @media (max-width: 768px) {
            * {
                -webkit-tap-highlight-color: transparent;
            }
            
            .btn, .nav-back {
                -webkit-touch-callout: none;
                user-select: none;
            }
            
            /* 按钮点击反馈 */
            .btn:active {
                transform: scale(0.98);
                opacity: 0.9;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 主题切换器 -->
        <div class="theme-switcher-wrapper">
            <div class="mode-switcher">
                <button class="switch-btn" data-mode="light" title="浅色模式">
                    <span class="switch-icon">☀️</span>
                </button>
                <button class="switch-btn" data-mode="dark" title="深色模式">
                    <span class="switch-icon">🌙</span>
                </button>
                <button class="switch-btn" data-mode="auto" title="跟随系统">
                    <span class="switch-icon">🔄</span>
                </button>
            </div>
        </div>
        
        <a href="index.html" class="nav-back">返回首页</a>
        
        <header class="page-header">
            <span class="page-icon">📰</span>
            <h1 class="page-title">新闻简报归档</h1>
            <p class="page-subtitle">12H 宏观交易新闻简报 · 每日早晚更新</p>
        </header>
        
        <div id="briefing-list" class="briefing-list">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>加载中...</div>
            </div>
        </div>
    </div>
    
    <script>
        // 加载最新简报数据
        fetch('data/news/latest.json')
            .then(r => {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(data => {
                const container = document.getElementById('briefing-list');
                
                // 生成卡片 HTML
                const html = `
                    <div class="briefing-card" onclick="window.location.href='data/news/latest.html'">
                        <div class="briefing-card-header">
                            <span class="briefing-icon">🟢</span>
                            <h2 class="briefing-title">${escapeHtml(data.title || '新闻简报')}</h2>
                        </div>
                        <div class="briefing-meta">
                            <span class="meta-item">📅 ${escapeHtml(data.timestamp || '未知')}</span>
                            <span class="meta-item">📊 ${data.newsCount || 0} 条</span>
                            <span class="meta-item">🆔 ${escapeHtml(data.msgid || 'N/A')}</span>
                        </div>
                        <div class="briefing-preview">${escapeHtml(data.coreContent || data.fullContent || '暂无内容').substring(0, 300)}...</div>
                        <div class="briefing-actions">
                            <a href="data/news/latest.html" class="btn btn-primary">阅读全文 →</a>
                            <a href="data/news/latest.json" class="btn btn-secondary" download>下载 JSON</a>
                        </div>
                    </div>
                `;
                
                container.innerHTML = html;
            })
            .catch(e => {
                console.error('加载失败:', e);
                const container = document.getElementById('briefing-list');
                container.innerHTML = `
                    <div class="error">
                        <div class="error-icon">⚠️</div>
                        <p>数据加载失败</p>
                        <p style="font-size: 13px; margin-top: 10px; color: var(--apple-text-secondary);">${e.message}</p>
                        <div style="margin-top: 24px;">
                            <a href="index.html" class="btn btn-primary">返回首页</a>
                        </div>
                    </div>
                `;
            });
        
        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 主题切换逻辑
        (function() {
            const switchBtns = document.querySelectorAll('.switch-btn');
            const body = document.body;
            
            // 读取保存的模式（默认 auto）
            const savedMode = localStorage.getItem('pulse-theme-mode') || 'auto';
            applyMode(savedMode);
            syncButtons();
            
            // 应用模式
            function applyMode(mode) {
                body.classList.remove('dark-mode', 'light-mode');
                
                if (mode === 'auto') {
                    // 自动模式：不添加类，让 CSS media query 生效
                } else if (mode === 'dark') {
                    body.classList.add('dark-mode');
                } else if (mode === 'light') {
                    body.classList.add('light-mode');
                }
                
                syncButtons();
            }
            
            // 同步按钮状态
            function syncButtons() {
                const currentMode = localStorage.getItem('pulse-theme-mode') || 'auto';
                switchBtns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === currentMode);
                });
            }
            
            // 绑定点击事件
            switchBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const mode = this.dataset.mode;
                    localStorage.setItem('pulse-theme-mode', mode);
                    applyMode(mode);
                    
                    // 触觉反馈
                    this.classList.add('haptic-press');
                    setTimeout(() => this.classList.remove('haptic-press'), 150);
                });
            });
            
            // 监听系统主题变化
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                const currentMode = localStorage.getItem('pulse-theme-mode') || 'auto';
                if (currentMode === 'auto') {
                    applyMode('auto');
                }
            });
        })();
    </script>
</body>
</html>
