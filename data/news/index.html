<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻简报 · Pulse</title>
    <link rel="stylesheet" href="../../styles.css">
    <style>
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #0a84ff; text-decoration: none; margin-bottom: 20px; }
        .briefing-card { background: rgba(44, 44, 46, 0.65); backdrop-filter: blur(20px); border-radius: 20px; padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 20px; }
        .briefing-title { font-size: 1.5rem; margin-bottom: 10px; }
        .briefing-meta { color: #86868b; font-size: 0.9rem; margin-bottom: 20px; }
        .briefing-content { white-space: pre-wrap; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-link">← 返回首页</a>
        
        <header class="header">
            <h1>📰 新闻简报归档</h1>
        </header>
        
        <div id="briefing-list"></div>
    </div>
    
    <script>
        fetch('latest.json')
            .then(r => r.json())
            .then(data => {
                const html = `
                    <div class="briefing-card">
                        <h2 class="briefing-title">${data.title || '最新简报'}</h2>
                        <div class="briefing-meta">
                            <span>📅 ${data.timestamp || '未知时间'}</span> • 
                            <span>📊 ${data.newsCount || 0} 条新闻</span> •
                            <span>🆔 ${data.msgId || 'N/A'}</span>
                        </div>
                        <div class="briefing-content">${data.content || '内容加载中...'}</div>
                    </div>
                `;
                document.getElementById('briefing-list').innerHTML = html;
            })
            .catch(e => {
                document.getElementById('briefing-list').innerHTML = '<p>数据加载失败</p>';
            });
    </script>
</body>
</html>
