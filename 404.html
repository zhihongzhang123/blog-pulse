<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 · Pulse</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-container { max-width: 600px; margin: 0 auto; padding: 100px 20px; text-align: center; }
        .error-code { font-family: 'Playfair Display', serif; font-size: 8rem; font-weight: 700; background: linear-gradient(135deg, #ffd60a 0%, #ff9f0a 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 20px; }
        .error-message { font-size: 1.5rem; color: #e8eef6; margin-bottom: 40px; }
        .error-description { color: #86868b; line-height: 1.8; margin-bottom: 40px; }
        .back-home { display: inline-block; background: linear-gradient(135deg, #0a84ff 0%, #5e5ce6 100%); color: white; padding: 12px 32px; border-radius: 40px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; }
        .back-home:hover { transform: scale(1.05); box-shadow: 0 8px 24px rgba(10, 132, 255, 0.4); }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-message">页面未找到</h1>
        <p class="error-description">
            市场如潮水，有涨必有落。<br>
            页面如交易，有时会迷失方向。<br>
            但别担心，返回首页，重新开始。
        </p>
        <a href="index.html" class="back-home">返回首页 →</a>
    </div>
</body>
</html>
